<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        background-color: #d56025;
        font-size: 300%;
        font-family:'Courier New', Courier, monospace;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        left: 0px;
        border-radius: 15%;
      }

      /* Add this anywhere inside your <style> tags */
      .box-echo {
        width: 70px;
        height: 70px;
        background-color: #d56025;
        position: absolute;
        border-radius: 15%;
        opacity: 0.4;
        transition: opacity 0.2s linear, transform 0.2s linear;
        pointer-events: none;
        z-index: -1;
      }

      .board {
        height: 100vh;
      }
      /*css for scount*/
      #scount {
        position: absolute;
        top: 1050px;
        left: 1030px;
        font-family: sans-serif;
        font-size: 2em;
        transition: font-size 0.5s ease-out;
      }
      /* css for mc */
      #misclick-count {
        position: absolute;
        top: 30px;
        left: 1000px;
        font-family: sans-serif;
        font-size: 1.2em;
      }
    </style>
  </head>

  <body class="board">
    <div class="box">?</div>
    <div id="scount">Speed: 0</div>
    <div id="misclick-count">Misclicks: 0 / 50</div>
  
    <script>
      (function () {
        "use strict";
      
        var box = jQuery(".box"); 
        var board = jQuery(".board"); 
        var boardWidth = board.width(); 

        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        var scount = jQuery("#scount");
        var misclickDisplay = jQuery("#misclick-count");

       
        var gameInterval = setInterval(update, 20);

        box.on("click", handleBoxClick);
        
        // clicks for bg
        board.on("click", handleBoardClick);

        // vars
        var positionX = 0;
        var points = 0;
        var speed = 3;
        var positionY = 0;
        var speedY = Math.random() * 3;
        var boardHeight = jQuery(window).height();
        
        // keeps track of mc
        var misclicks = 0;
        var isGameOver = false;

        function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY);
        }

        function changeBoxText(newText) {
          box.text(newText);
        }

        function update() {
          moveBoxTo(positionX, positionY);
          positionX += speed;
          positionY += speedY;

          var echo = jQuery("<div></div>")
        .addClass("box-echo")
        .css({
         left: positionX + "px",
         top: positionY + "px"
          });

          board.append(echo);

          setTimeout(function () {
          echo.css({
          opacity: 0,
         transform: "scale(0.5)"
        });
       }, 10);

          if (positionX > boardWidth) {
            speed *= -1;
          }
          else if (positionX < 0){
            speed *= -1;
          }
          

          if (positionY > boardHeight) {
            speedY *= -1;
          }
          else if (positionY < 0){
            speedY *= -1;
          }

          var currentSpeed = Math.abs(speed);
          scount.text("Speed: " + currentSpeed);

          var currentSpeed = Math.abs(speed);
          scount.text("Speed: " + currentSpeed.toFixed(1)); /* rounds the scount*/
        }

        function handleBoardClick() {


          if (isGameOver) return;

          misclicks += 1;
          misclickDisplay.text("Misclicks: " + misclicks + " / 50");

          if (misclicks >= 50) {
            endGame();
          }

          
        }

        function handleBoxClick(event) {
          if (isGameOver) return;

          event.stopPropagation();

          /*var randNum = Math.random() * boardWidth;*/
          points += 1;
          speed += .3 * points + 1;
          changeBoxText(points);
        }


        function endGame() {
          isGameOver = true;
          clearInterval(gameInterval);
          box.off("click");
          board.off("click");
          
          changeBoxText("X_X");
          alert("Game Over! You misclicked 50 times. Total Score: " + points);
        }
      })();
    </script>
  </body>
</html>
