<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: #d56025;
        font-size: 300%;
        font-family:'Courier New', Courier, monospace;
        text-align: center;
        line-height: 100px;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        left: 0px;
        border-radius: 15%;
      }

      /* css for the box trail */
      .box-echo {
        width: 100px;
        height: 100px;
        background-color: #d56025;
        position: absolute;
        border-radius: 15%;
        opacity: 0.4;
        transition: opacity 0.2s linear, transform 0.2s linear;
        pointer-events: none;
        z-index: -1;
      }

      .board {
        height: 100vh;
      }
      /*css for scount*/
      #scount {
        position: absolute;
        top: 1050px;
        left: 1030px;
        font-family: sans-serif;
        font-size: 2em;
        transition: font-size 0.5s ease-out;
      }
      /* css for mc */
      #misclick-count {
        position: absolute;
        top: 30px;
        left: 1000px;
        font-family: sans-serif;
        font-size: 1.2em;
      }
    </style>
  </head>

  <body class="board">
    <div class="box">?</div>
    <div id="scount">Speed: 0</div>
    <div id="misclick-count">Misclicks: 0 / 100</div>
  
    <script>
  (function () {
    "use strict";
  
    var box = jQuery(".box"); 
    var board = jQuery(".board"); 
    var boardWidth = board.width(); 

    jQuery(window).on("resize", function () {
      boardWidth = board.width();
      boardHeight = jQuery(window).height(); 
    });

    var scount = jQuery("#scount");
    var misclickDisplay = jQuery("#misclick-count");

    var gameInterval = setInterval(update, 15);

    box.on("click", handleBoxClick);
    board.on("click", handleBoardClick);

    // vars
    var positionX = 0;
    var positionY = 0;
    var points = 0;
    var baseSpeed = 3;
    var directionX = 1;
    var directionY = 1;
    var speedY_multiplier = Math.random() * 3; // y angle at random
    var boardHeight = jQuery(window).height();
    var misclicks = 0;
    var isGameOver = false;

    function moveBoxTo(newPositionX, newPositionY) {
      box.css("left", newPositionX);
      box.css("top", newPositionY);
    }

    function changeBoxText(newText) {
      box.text(newText);
    }

    function update() {
     
      var currentSpeedX = baseSpeed * directionX;
      var currentSpeedY = baseSpeed * speedY_multiplier * directionY;

      moveBoxTo(positionX, positionY);
      positionX += currentSpeedX;
      positionY += currentSpeedY;

      
      var echo = jQuery("<div></div>")
        .addClass("box-echo")
        .css({
          left: positionX + "px",
          top: positionY + "px"
        });

      board.append(echo);

      
      setTimeout(function () {
        echo.css({
          opacity: 0,
          transform: "scale(0.5)"
        });
        setTimeout(function() {
          echo.remove(); 
        }, 200);
      }, 10);

       
      if (positionX > (boardWidth - 100)) { 
        directionX = -1;
      }
      else if (positionX < 0){
        directionX = 1;
      }
      
      if (positionY > (boardHeight - 100)) { 
        directionY = -1;
      }
      else if (positionY < 0){
        directionY = 1;
      }

      // to display the speed count on the screen
      scount.text("Speed: " + baseSpeed.toFixed(1)); 
    }

    function handleBoardClick() {

      
      if (isGameOver) return;

      misclicks += 1;
      misclickDisplay.text("Misclicks: " + misclicks + " / 100");

      if (misclicks >= 100) {
        endGame();
      }
    }

    function handleBoxClick(event) {
      if (isGameOver) return;

      event.stopPropagation();

      points += 1;
      // base speed increases exactly by .3
      baseSpeed += .3; 
      
      changeBoxText(points);
    }

    function endGame() {
      isGameOver = true;
      clearInterval(gameInterval);
      box.off("click");
      board.off("click");
      
      changeBoxText("X_X");
      alert("Game Over! You misclicked 100 times. Total Score: " + points);
    }
  })();
</script>
  </body>
</html>
